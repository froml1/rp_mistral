# ── CHARACTER KNOWLEDGE ───────────────────────────────────────────────────────
# Epistemic profile per character. Three states:
#   sait       — established fact the character is aware of (may still be wrong from reader POV)
#   ne_sait_pas — ignorance: the fact exists in the lore but the character is unaware
#   croit      — belief: may be true or false; can be sourced from culture or universe rules
#
# Knowledge items can reference lore entities (via `entity` field) or be free text.
# Beliefs can carry source_culture / source_rule to explain their origin.
# Narrative tension arises when `croit` contradicts established lore facts.

character_knowledge: {}
# Antoine:
#   sait:
#     - description: "Une organisation veut le faire disparaître avant l'aube"
#       entity: null
#       established: "taverne_test:2024-03-10T19:15"
#       confidence: llm
#   ne_sait_pas:
#     - description: "L'identité des commanditaires de la menace"
#       entity: null
#       confidence: llm
#   croit:
#     - description: "La méfiance envers les inconnus est de mise"
#       entity: null
#       source_culture: Vran_shi
#       source_rule: null
#       verified: false     # true = belief confirmed by lore facts; false = uncertain or wrong
#       confidence: llm

# ── EDGES ─────────────────────────────────────────────────────────────────────
# Dedup key: (from, rel, to, state) — same relation can exist in multiple temporal states.

