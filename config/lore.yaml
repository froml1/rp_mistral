# World Knowledge Graph
# ─────────────────────────────────────────────────────────────────────────────
# confidence : "verified" | "llm" | "low"
#
# state (nodes and relations):
#   "est"  — currently active / existing
#   "fut"  — existed in the past, no longer active (history preserved)
#   "sera" — projected / planned / anticipated future state
#   Default is "est" when omitted.
#
# Relations are NEVER deleted on state change — they transition.
# The dedup key for relations is (from, rel, to, state), so the same
# relation can exist in multiple temporal states simultaneously.
#
# ─── Node types ───────────────────────────────────────────────────────────────
# character, place, event, object, culture, intention, narrative_axis, rule
#
# ─── Relation vocabulary ──────────────────────────────────────────────────────
#   character–character  : frère_de sœur_de parent_de enfant_de ami_de ennemi_de
#                          rival_de allié_de amant_de maître_de élève_de membre_de
#   character–place      : présent_à habite vient_de fuit_de se_dirige_vers
#   character–event      : participe_à cause subit témoin_de
#   character–object     : possède utilise cherche a_créé a_perdu
#   character–culture    : appartient_à pratique rejette
#   character–intention  : a_intention
#   place–place          : contient adjacent_à fait_partie_de
#   place–event          : lieu_de
#   place–culture        : territoire_de influencé_par
#   event–event          : précède cause suit
#   event–object         : implique
#   event–culture        : reflète transgresse
#   event–temporality    : à_lieu_à
#   object–place         : situé_à vient_de
#   object–culture       : artefact_de
#   intention–event      : vise a_déclenché
#   culture–rule         : dicte
#   narrative_axis–*     : inclut
#   narrative_axis–axis  : croise
# ─────────────────────────────────────────────────────────────────────────────

# ── NODES ─────────────────────────────────────────────────────────────────────

